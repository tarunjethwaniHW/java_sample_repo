server.port=8085
spring.application.name=history-service

# IBM DB2 Connection Properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:db2://db2:50000/histdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:db2inst1}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:db2pwd}
spring.datasource.driver-class-name=com.ibm.db2.jcc.DB2Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.DB2Dialect
spring.jpa.show-sql=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=history-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

history.kafka.topic=history-topic
